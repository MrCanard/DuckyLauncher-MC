name: Release DuckyLauncher

# Se déclenche dès que tu pousses un tag "vX.Y.Z" (ex: git tag v0.1.0 && git push --tags)
# Ne nécessite AUCUN secret pour ce premier build : il produit juste le .exe.
# (La signature/auto-update pourra être activée plus tard, voir README.)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # permet aussi de déclencher le build manuellement depuis l'onglet Actions

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Installer Node (pour tauri-action)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build + publish le .exe (fait tout automatiquement)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DuckyLauncher ${{ github.ref_name }}"
          releaseBody: "Build automatique de DuckyLauncher."
          releaseDraft: false
          prerelease: false
